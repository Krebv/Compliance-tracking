name: Daily Compliance Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # 02:00 Singapore time daily

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify project files
        run: |
          test -f data/sources.json
          test -f scripts/update-compliance.mjs
          node -e "JSON.parse(require('fs').readFileSync('data/sources.json','utf8')); console.log('sources.json is valid JSON')"

      - name: Run regulatory monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: npm run update

      - name: Commit updated compliance data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/compliance.json data/changes.json data/alerts.json data/history/*.json
          git diff --cached --quiet || git commit -m "Automated regulatory monitoring update"
          git push
